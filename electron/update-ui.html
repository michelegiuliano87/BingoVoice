<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BingoVoice Updater</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #040817;
        --panel: #101a2c;
        --panel-2: rgba(9, 14, 26, 0.98);
        --border: rgba(255, 255, 255, 0.08);
        --text: #f8fafc;
        --muted: #94a3b8;
        --cyan: #06b6d4;
        --cyan-2: #22d3ee;
        --violet: #7c5cff;
        --violet-2: #4f46e5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(34, 211, 238, 0.16), transparent 26%),
          radial-gradient(circle at top right, rgba(124, 92, 255, 0.22), transparent 30%),
          radial-gradient(circle at bottom left, rgba(14, 165, 233, 0.12), transparent 24%),
          var(--bg);
      }

      .panel {
        position: relative;
        overflow: hidden;
        width: min(100%, 590px);
        border-radius: 30px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(16, 26, 44, 0.96), var(--panel-2));
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
        padding: 30px;
      }

      .panel::before,
      .panel::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        pointer-events: none;
      }

      .panel::before {
        top: -120px;
        left: -120px;
        width: 260px;
        height: 260px;
        background: radial-gradient(circle, rgba(34, 211, 238, 0.18), transparent 68%);
      }

      .panel::after {
        right: -90px;
        bottom: -110px;
        width: 260px;
        height: 260px;
        background: radial-gradient(circle, rgba(124, 92, 255, 0.2), transparent 68%);
      }

      .eyebrow,
      .hero,
      .progress-wrap,
      .actions,
      .status-chip {
        position: relative;
        z-index: 1;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 8px 14px;
        border: 1px solid rgba(34, 211, 238, 0.28);
        background: rgba(8, 145, 178, 0.14);
        color: #a5f3fc;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      .hero {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-top: 18px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 34px;
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .badge {
        width: 96px;
        height: 96px;
        display: grid;
        place-items: center;
        border-radius: 24px;
        background:
          radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.12), transparent 32%),
          linear-gradient(135deg, rgba(15, 23, 42, 0.6), rgba(30, 41, 59, 0.8));
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 10px;
      }

      .badge img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .status-chip {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 18px;
        padding: 12px 14px;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--cyan), var(--cyan-2));
        box-shadow: 0 0 18px rgba(34, 211, 238, 0.5);
      }

      .status-chip strong {
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .progress-wrap {
        margin-top: 22px;
        padding: 16px;
        border-radius: 22px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
      }

      .progress-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .progress-head strong {
        font-size: 14px;
      }

      .progress-head span {
        color: #67e8f9;
        font-weight: 700;
      }

      .bar {
        width: 100%;
        height: 12px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(148, 163, 184, 0.16);
      }

      .bar-fill {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--cyan), var(--cyan-2), #8b5cf6);
        transition: width 180ms ease;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 22px;
      }

      .log {
        margin-top: 14px;
        font-size: 11px;
        color: #94a3b8;
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        padding: 10px;
        min-height: 36px;
        white-space: pre-line;
      }

      button {
        flex: 1;
        border: 0;
        border-radius: 16px;
        padding: 14px 16px;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
        transition: transform 160ms ease, opacity 160ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      .primary {
        background: linear-gradient(135deg, var(--violet), var(--violet-2));
        color: white;
        box-shadow: 0 14px 30px rgba(99, 102, 241, 0.32);
      }

      .secondary {
        background: rgba(148, 163, 184, 0.12);
        color: var(--text);
        border: 1px solid var(--border);
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="eyebrow">BingoVoice Updater</div>

      <div class="hero">
        <div>
          <h1 id="title">Controllo aggiornamenti</h1>
          <p id="message">Sto verificando se esiste una versione piu recente prima di aprire il programma.</p>
        </div>
        <div class="badge">
          <img src="../assets/logo.png" alt="BingoVoice" />
        </div>
      </div>

      <div class="status-chip">
        <div class="dot"></div>
        <strong id="statusChip">Verifica in corso</strong>
      </div>

      <div id="progressWrap" class="progress-wrap hidden">
        <div class="progress-head">
          <strong id="progressLabel">Download aggiornamento</strong>
          <span id="progressPercent">0%</span>
        </div>
        <div class="bar">
          <div id="barFill" class="bar-fill"></div>
        </div>
      </div>

      <div id="actions" class="actions hidden">
        <button id="primaryButton" class="primary">Aggiorna ora</button>
        <button id="secondaryButton" class="secondary">Apri senza aggiornare</button>
      </div>

      <div id="log" class="log">In attesa di controllo aggiornamenti...</div>
    </div>

    <script>
      const title = document.getElementById("title");
      const message = document.getElementById("message");
      const progressWrap = document.getElementById("progressWrap");
      const progressLabel = document.getElementById("progressLabel");
      const progressPercent = document.getElementById("progressPercent");
      const barFill = document.getElementById("barFill");
      const actions = document.getElementById("actions");
      const primaryButton = document.getElementById("primaryButton");
      const secondaryButton = document.getElementById("secondaryButton");
      const statusChip = document.getElementById("statusChip");
      const log = document.getElementById("log");

      const setLog = (value) => {
        if (!log) return;
        log.textContent = value || "";
      };

      const showActions = (primary, secondary) => {
        primaryButton.textContent = primary;
        secondaryButton.textContent = secondary;
        actions.classList.remove("hidden");
      };

      const hideActions = () => actions.classList.add("hidden");

      const showProgress = (value, label = "Download aggiornamento") => {
        progressWrap.classList.remove("hidden");
        progressLabel.textContent = label;
        const rounded = Math.max(0, Math.min(100, Math.round(value)));
        progressPercent.textContent = `${rounded}%`;
        barFill.style.width = `${rounded}%`;
      };

      const setStatusChip = (text) => {
        statusChip.textContent = text;
      };

      primaryButton.addEventListener("click", () => {
        setStatusChip("Download in corso");
        window.desktopAPI?.updaterAction("download");
        hideActions();
      });

      secondaryButton.addEventListener("click", () => {
        window.desktopAPI?.updaterAction("skip");
      });

      window.desktopAPI?.onUpdateStatus((payload) => {
        switch (payload?.type) {
          case "checking":
            title.textContent = "Controllo aggiornamenti";
            message.textContent = "Sto verificando se esiste una versione piu recente prima di aprire il programma.";
            setStatusChip("Verifica in corso");
            setLog(payload?.details || "Controllo in corso...");
            hideActions();
            break;
          case "available":
            title.textContent = "Aggiornamento disponibile";
            message.textContent = `E disponibile la versione ${payload.version}. Vuoi installarla prima di aprire BingoVoice?`;
            setStatusChip("Nuova versione trovata");
            setLog(payload?.details || `Nuova versione trovata: ${payload.version}`);
            showActions("Aggiorna ora", "Apri senza aggiornare");
            break;
          case "downloading":
            title.textContent = "Aggiornamento in corso";
            message.textContent = "Sto scaricando e preparando la nuova versione di BingoVoice.";
            setStatusChip("Download in corso");
            setLog(payload?.details || "Download aggiornamento in corso...");
            showProgress(payload.percent || 0);
            break;
          case "downloaded":
            title.textContent = "Installazione aggiornamento";
            message.textContent = "Download completato. Sto chiudendo e riavviando BingoVoice per installare l'aggiornamento.";
            setStatusChip("Installazione in preparazione");
            setLog(payload?.details || "Aggiornamento pronto.");
            showProgress(100, "Aggiornamento pronto");
            hideActions();
            break;
          case "up-to-date":
            title.textContent = "BingoVoice aggiornato";
            message.textContent = "Non sono stati trovati aggiornamenti. Sto aprendo il programma.";
            setStatusChip("Versione aggiornata");
            setLog(payload?.details || "Nessun aggiornamento disponibile.");
            hideActions();
            break;
          case "error":
            title.textContent = "Aggiornamento non disponibile";
            message.textContent = payload.message || "Non sono riuscito a controllare gli aggiornamenti. Sto aprendo il programma.";
            setStatusChip("Controllo non riuscito");
            setLog(payload?.details || payload.message || "Errore nel controllo aggiornamenti.");
            hideActions();
            break;
          default:
            break;
        }
      });
    </script>
  </body>
</html>
