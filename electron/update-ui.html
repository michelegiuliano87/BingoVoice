<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BingoVoice Updater</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #06111f;
        --panel: #101a2c;
        --border: rgba(255, 255, 255, 0.08);
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #06b6d4;
        --accent-2: #22d3ee;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Segoe UI, Arial, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(34, 211, 238, 0.18), transparent 32%),
          radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.14), transparent 28%),
          var(--bg);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .panel {
        width: min(100%, 560px);
        border-radius: 28px;
        border: 1px solid var(--border);
        background: linear-gradient(180deg, rgba(16, 26, 44, 0.96), rgba(9, 14, 26, 0.98));
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        padding: 28px;
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        padding: 8px 14px;
        border: 1px solid rgba(34, 211, 238, 0.28);
        background: rgba(8, 145, 178, 0.14);
        color: #a5f3fc;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }
      h1 {
        margin: 18px 0 10px;
        font-size: 34px;
        line-height: 1.05;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.55;
      }
      .progress-wrap {
        margin-top: 22px;
        padding: 16px;
        border-radius: 22px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.02);
      }
      .progress-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }
      .progress-head strong {
        font-size: 14px;
      }
      .progress-head span {
        color: #67e8f9;
        font-weight: 700;
      }
      .bar {
        width: 100%;
        height: 12px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(148, 163, 184, 0.16);
      }
      .bar-fill {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        transition: width 180ms ease;
      }
      .actions {
        display: flex;
        gap: 12px;
        margin-top: 22px;
      }
      button {
        flex: 1;
        border: 0;
        border-radius: 16px;
        padding: 14px 16px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }
      .primary {
        background: linear-gradient(135deg, #06b6d4, #0891b2);
        color: #04111a;
      }
      .secondary {
        background: rgba(148, 163, 184, 0.12);
        color: var(--text);
        border: 1px solid var(--border);
      }
      .hidden { display: none; }
      .spinner {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 2px solid rgba(255,255,255,0.25);
        border-top-color: white;
        animation: spin 0.9s linear infinite;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <div class="eyebrow">BingoVoice Updater</div>
      <h1 id="title">Controllo aggiornamenti</h1>
      <p id="message">Sto verificando se esiste una versione più recente prima di aprire il programma.</p>

      <div id="progressWrap" class="progress-wrap hidden">
        <div class="progress-head">
          <strong id="progressLabel">Download aggiornamento</strong>
          <span id="progressPercent">0%</span>
        </div>
        <div class="bar">
          <div id="barFill" class="bar-fill"></div>
        </div>
      </div>

      <div id="actions" class="actions hidden">
        <button id="primaryButton" class="primary">Aggiorna ora</button>
        <button id="secondaryButton" class="secondary">Apri senza aggiornare</button>
      </div>
    </div>

    <script>
      const title = document.getElementById("title");
      const message = document.getElementById("message");
      const progressWrap = document.getElementById("progressWrap");
      const progressLabel = document.getElementById("progressLabel");
      const progressPercent = document.getElementById("progressPercent");
      const barFill = document.getElementById("barFill");
      const actions = document.getElementById("actions");
      const primaryButton = document.getElementById("primaryButton");
      const secondaryButton = document.getElementById("secondaryButton");

      const showActions = (primary, secondary) => {
        primaryButton.textContent = primary;
        secondaryButton.textContent = secondary;
        actions.classList.remove("hidden");
      };

      const hideActions = () => actions.classList.add("hidden");
      const showProgress = (value, label = "Download aggiornamento") => {
        progressWrap.classList.remove("hidden");
        progressLabel.textContent = label;
        const rounded = Math.max(0, Math.min(100, Math.round(value)));
        progressPercent.textContent = `${rounded}%`;
        barFill.style.width = `${rounded}%`;
      };

      primaryButton.addEventListener("click", () => {
        window.desktopAPI?.updaterAction("download");
        hideActions();
      });

      secondaryButton.addEventListener("click", () => {
        window.desktopAPI?.updaterAction("skip");
      });

      window.desktopAPI?.onUpdateStatus((payload) => {
        switch (payload?.type) {
          case "checking":
            title.textContent = "Controllo aggiornamenti";
            message.textContent = "Sto verificando se esiste una versione più recente prima di aprire il programma.";
            hideActions();
            break;
          case "available":
            title.textContent = "Aggiornamento disponibile";
            message.textContent = `È disponibile la versione ${payload.version}. Vuoi installarla prima di aprire BingoVoice?`;
            showActions("Aggiorna ora", "Apri senza aggiornare");
            break;
          case "downloading":
            title.textContent = "Aggiornamento in corso";
            message.textContent = "Sto scaricando e preparando la nuova versione di BingoVoice.";
            showProgress(payload.percent || 0);
            break;
          case "downloaded":
            title.textContent = "Installazione aggiornamento";
            message.textContent = "Download completato. Sto chiudendo e riavviando BingoVoice per installare l'aggiornamento.";
            showProgress(100, "Aggiornamento pronto");
            hideActions();
            break;
          case "up-to-date":
            title.textContent = "BingoVoice aggiornato";
            message.textContent = "Non sono stati trovati aggiornamenti. Sto aprendo il programma.";
            hideActions();
            break;
          case "error":
            title.textContent = "Aggiornamento non disponibile";
            message.textContent = payload.message || "Non sono riuscito a controllare gli aggiornamenti. Sto aprendo il programma.";
            hideActions();
            break;
          default:
            break;
        }
      });
    </script>
  </body>
</html>
